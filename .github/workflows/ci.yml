name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Check format
        run: cargo fmt --all --manifest-path engine/Cargo.toml -- --check

      - name: Clippy
        run: cargo clippy --workspace --manifest-path engine/Cargo.toml --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace --manifest-path engine/Cargo.toml
