<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Dashboard</title>
<script src="https://unpkg.com/vis-network@9.1.9/dist/vis-network.min.js"></script>
<style>
:root {
  --bg: #0f172a; --card: #1e293b; --border: #334155;
  --muted: #94a3b8; --text: #e2e8f0; --accent: #3b82f6;
  --green: #22c55e; --red: #ef4444; --amber: #f59e0b; --slate: #64748b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font: 14px/1.5 system-ui, sans-serif; }
header { display: flex; align-items: center; gap: 24px; padding: 12px 20px;
  background: var(--card); border-bottom: 1px solid var(--border); }
header h1 { font-size: 18px; font-weight: 600; }
nav { display: flex; gap: 4px; }
nav a { padding: 6px 14px; border-radius: 6px; color: var(--muted); text-decoration: none;
  font-size: 13px; transition: background .15s; cursor: pointer; }
nav a:hover, nav a.active { background: #1e3a5f; color: var(--text); }
main { max-width: 1200px; margin: 0 auto; padding: 20px; }
h2 { font-size: 16px; margin-bottom: 12px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 8px;
  padding: 16px; margin-bottom: 16px; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
th { color: var(--muted); font-weight: 500; font-size: 12px; text-transform: uppercase; }
td { font-size: 13px; }
.btn { display: inline-block; padding: 6px 14px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--card); color: var(--text);
  cursor: pointer; font-size: 13px; text-decoration: none; transition: background .15s; }
.btn:hover { background: #1e3a5f; }
.btn-primary { background: var(--accent); border-color: var(--accent); }
.btn-primary:hover { background: #2563eb; }
.btn-danger { background: #f87171; border-color: #ef4444; color: #fff; }
.btn-danger:hover { background: #ef4444; }
.btn-danger { border-color: var(--red); color: var(--red); }
.btn-danger:hover { background: #3b1010; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
.badge-Pending { background: var(--slate); }
.badge-Running { background: var(--accent); }
.badge-Completed, .badge-completed { background: var(--green); }
.badge-Failed, .badge-failed { background: var(--red); }
.badge-TimedOut { background: var(--amber); color: #000; }
.row { display: flex; gap: 16px; }
.col { flex: 1; min-width: 0; }
.dag-container { width: 100%; height: 520px; border: 1px solid var(--border);
  border-radius: 8px; background: var(--bg); position: relative; overflow: hidden; }
.log-panel { height: 300px; overflow-y: auto; font: 12px/1.6 'Cascadia Code','Fira Code',monospace;
  background: #0a0f19; border-radius: 8px; padding: 12px; }
.log-line { padding: 1px 0; }
.log-ts { color: var(--slate); margin-right: 8px; }
.log-node { color: #38bdf8; margin-right: 8px; }
.log-text { color: var(--muted); }
.stats { display: flex; gap: 16px; margin-bottom: 20px; }
.stat { flex: 1; background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px; text-align: center; }
.stat-val { font-size: 28px; font-weight: 700; }
.stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }
.empty { color: var(--muted); text-align: center; padding: 40px; }
.meta { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
.meta span { margin-right: 16px; }
#toast { position: fixed; top: 16px; right: 16px; background: var(--green); color: #fff;
  padding: 10px 20px; border-radius: 8px; font-size: 13px; z-index: 100;
  opacity: 0; transition: opacity .3s; pointer-events: none; }
#toast.show { opacity: 1; }
input, textarea { background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); padding: 8px 12px; font-size: 13px; width: 100%; }
textarea { font-family: 'Cascadia Code','Fira Code',monospace; min-height: 200px; resize: vertical; }
.form-group { margin-bottom: 12px; }
.form-group label { display: block; margin-bottom: 4px; color: var(--muted); font-size: 12px; }
.spin { display: inline-block; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
/* Node detail panel */
#node-panel{position:fixed;top:0;right:-440px;width:440px;height:100vh;background:var(--card);
  border-left:2px solid var(--accent);z-index:200;transition:right .25s ease;overflow-y:auto;
  padding:20px 24px;box-shadow:-4px 0 24px rgba(0,0,0,.5);}
#node-panel.open{right:0}
#node-panel h3{font-size:16px;margin-bottom:4px;color:var(--accent)}
#node-panel h4{font-size:11px;color:var(--muted);text-transform:uppercase;margin:16px 0 6px;letter-spacing:.5px}
#node-panel .close-btn{position:absolute;top:10px;right:14px;background:none;border:none;
  color:var(--muted);font-size:24px;cursor:pointer;line-height:1}
#node-panel .close-btn:hover{color:var(--text)}
#node-panel .kv{display:flex;margin-bottom:3px;font-size:12px}
#node-panel .kv-k{color:var(--muted);width:110px;flex-shrink:0}
#node-panel .kv-v{color:var(--text);word-break:break-all;font-family:monospace;font-size:11px}
#node-panel .prompt-block{background:var(--bg);border:1px solid var(--border);
  border-radius:6px;padding:10px;font:11px/1.5 monospace;max-height:240px;
  overflow-y:auto;white-space:pre-wrap;word-break:break-all;color:var(--muted)}
#node-panel .tag{display:inline-block;padding:1px 7px;border-radius:4px;
  font-size:10px;margin:1px 2px;background:#1e3a5f;color:#60a5fa}
#node-panel .g-tag{background:#1a3a2a;color:#4ade80}
#node-panel .r-tag{background:#3a2a1a;color:#facc15}
#node-panel .no-data{color:var(--muted);font-size:12px;font-style:italic}
#overlay{position:fixed;top:0;left:0;width:100vw;height:100vh;
  background:rgba(0,0,0,.35);z-index:199;display:none}
#overlay.show{display:block}
</style>
</head>
<body>
<div id="overlay"></div>
<div id="node-panel"><button class="close-btn" onclick="closeNodePanel()">&times;</button><div id="node-panel-content"></div></div>
<div id="app">
  <header>
    <h1>Nexus Dashboard</h1>
    <nav>
      <a href="#dashboard" class="tab">Dashboard</a>
      <a href="#workflows" class="tab">Workflows</a>
      <a href="#runs" class="tab">Runs</a>
    </nav>
  </header>
  <main id="content"></main>
</div>
<div id="toast"></div>

<script>
// ── Config ──────────────────────────────────────────────────────
const BASE = window.location.origin;
const WS_BASE = BASE.replace(/^http/, 'ws');
const STATUS_COLORS = {
  Pending:'#64748b', Running:'#3b82f6', Completed:'#22c55e',
  Failed:'#ef4444', TimedOut:'#f59e0b', Skipped:'#475569'
};

// ── State ───────────────────────────────────────────────────────
let dagNetwork = null, dagNodes = null, dagEdges = null;
let dagReady = false, pendingStatuses = [];
let logs = [], wsConnection = null;
let nodeStates = {};
let activeRunId = null;
let currentGraph = null; // {nodes:[],edges:[],dataflows:[]} for the active view
let currentWfDef = null; // full workflow object (definition parsed)

// Persist logs + node states to sessionStorage so they survive refresh.
function saveState() {
  if (!activeRunId) return;
  try {
    sessionStorage.setItem('nexus_runId', activeRunId);
    sessionStorage.setItem('nexus_logs', JSON.stringify(logs.slice(-300)));
    sessionStorage.setItem('nexus_nodes', JSON.stringify(nodeStates));
  } catch(_) {}
}
function loadState(runId) {
  try {
    if (sessionStorage.getItem('nexus_runId') === runId) {
      logs = JSON.parse(sessionStorage.getItem('nexus_logs') || '[]');
      nodeStates = JSON.parse(sessionStorage.getItem('nexus_nodes') || '{}');
      return true;
    }
  } catch(_) {}
  return false;
}
function clearState() {
  try { sessionStorage.removeItem('nexus_runId'); sessionStorage.removeItem('nexus_logs'); sessionStorage.removeItem('nexus_nodes'); } catch(_) {}
}

// ── API ─────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  opts.body = body ? JSON.stringify(body) : (method !== 'GET' ? '{}' : undefined);
  const r = await fetch(BASE + path, opts);
  if (!r.ok) {
    const txt = await r.text().catch(() => '');
    throw new Error(`${method} ${path} → ${r.status}: ${txt}`);
  }
  return r.json();
}
const GET  = p => api('GET', p);
const POST = (p, b) => api('POST', p, b);
const DEL  = p => api('DELETE', p);

// ── Toast ───────────────────────────────────────────────────────
function toast(msg, isErr) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = isErr ? 'var(--red)' : 'var(--green)';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ── Router ──────────────────────────────────────────────────────
function nav() {
  const hash = location.hash || '#dashboard';
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.getAttribute('href') === hash));
  const parts = hash.slice(2).split('/'); // skip "#/"
  const view = hash.startsWith('#/') ? parts[0] : hash.slice(1).split('/')[0];
  const rest = hash.startsWith('#/') ? parts.slice(1) : hash.slice(1).split('/').slice(1);
  switch (view) {
    case 'dashboard': renderDashboard(); break;
    case 'workflows': rest[0] ? renderWorkflowDetail(rest[0]) : renderWorkflows(); break;
    case 'runs': rest[0] ? renderRunMonitor(rest[0]) : renderRuns(); break;
    default: renderDashboard();
  }
}
window.addEventListener('hashchange', nav);
window.addEventListener('load', nav);

// ── Event delegation: all buttons use data-action ───────────────
document.getElementById('content').addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;
  const id = btn.dataset.id || '';
  switch (action) {
    case 'trigger-run': triggerRun(id); break;
    case 'delete-wf': deleteWorkflow(id); break;
    case 'show-create-wf': showCreateWorkflow(); break;
    case 'create-wf': createWorkflow(); break;
    case 'cancel-form': nav(); break;
    case 'stop-run': stopRun(id); break;
    case 'goto': location.hash = btn.dataset.hash || '#' + id; break;
  }
});

// ── Dashboard ───────────────────────────────────────────────────
async function renderDashboard() {
  let wfs = [], runs = [];
  try { wfs = await GET('/api/workflows'); } catch(e) { console.error(e); }
  try { runs = await GET('/api/runs'); } catch(e) { console.error(e); }
  if (!Array.isArray(wfs)) wfs = [];
  if (!Array.isArray(runs)) runs = [];
  const rw = wfs.slice(0,5), rr = runs.slice(0,5);
  document.getElementById('content').innerHTML = `
    <div class="stats">
      <div class="stat"><div class="stat-val">${wfs.length}</div><div class="stat-label">Workflows</div></div>
      <div class="stat"><div class="stat-val">${runs.length}</div><div class="stat-label">Runs</div></div>
      <div class="stat"><div class="stat-val">${runs.filter(r=>r.status==='running').length}</div><div class="stat-label">Running</div></div>
    </div>
    <div class="row">
      <div class="col"><div class="card"><h2>Recent Workflows</h2>
        ${rw.length ? `<table><tr><th>Name</th><th>Updated</th><th></th></tr>
          ${rw.map(w => `<tr>
            <td><a href="#/workflows/${w.id}" style="color:var(--text)">${esc(w.name)}</a></td>
            <td style="color:var(--muted)">${w.updated_at||'-'}</td>
            <td><button class="btn btn-primary" data-action="trigger-run" data-id="${w.id}">Run</button></td>
          </tr>`).join('')}</table>` : '<div class="empty">No workflows yet</div>'}
      </div></div>
      <div class="col"><div class="card"><h2>Recent Runs</h2>
        ${rr.length ? `<table><tr><th>ID</th><th>Status</th><th>Finished</th></tr>
          ${rr.map(r => `<tr style="cursor:pointer" data-action="goto" data-hash="#/runs/${r.id}">
            <td style="font-family:monospace">${r.id.slice(0,8)}</td>
            <td><span class="badge badge-${r.status||'Pending'}">${r.status||'?'}</span></td>
            <td style="color:var(--muted)">${r.finished_at||'-'}</td>
          </tr>`).join('')}</table>` : '<div class="empty">No runs yet</div>'}
      </div></div>
    </div>`;
}

// ── Workflows ───────────────────────────────────────────────────
async function renderWorkflows() {
  let list = [];
  try { list = await GET('/api/workflows'); } catch(e) { toast('Failed to load workflows', true); }
  if (!Array.isArray(list)) list = [];
  document.getElementById('content').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 style="margin:0">Workflows (${list.length})</h2>
      <button class="btn btn-primary" data-action="show-create-wf">+ New Workflow</button>
    </div>
    <div class="card">
      ${list.length ? `<table><tr><th>Name</th><th>ID</th><th>Updated</th><th></th></tr>
        ${list.map(w => `<tr>
          <td><a href="#/workflows/${w.id}" style="color:var(--text);font-weight:500">${esc(w.name)}</a></td>
          <td style="font-family:monospace;color:var(--muted)">${w.id.slice(0,8)}</td>
          <td style="color:var(--muted)">${w.updated_at||'-'}</td>
          <td>
            <button class="btn" data-action="goto" data-hash="#/workflows/${w.id}">View</button>
            <button class="btn btn-primary" data-action="trigger-run" data-id="${w.id}">Run</button>
            <button class="btn btn-danger" data-action="delete-wf" data-id="${w.id}">Del</button>
          </td>
        </tr>`).join('')}</table>` : '<div class="empty">No workflows. Click "+ New Workflow" to create one.</div>'}
    </div>`;
}

function showCreateWorkflow() {
  document.getElementById('content').innerHTML = `
    <h2>New Workflow</h2>
    <div class="card">
      <div class="form-group"><label>Name</label><input id="wf-name" placeholder="my-workflow" value=""></div>
      <div class="form-group"><label>Definition (JSON)</label>
        <textarea id="wf-def">${esc('{\n  "nodes": [\n    {\n      "id": "hello",\n      "providers": [\n        { "type": "shell", "command": "scripts/node_ok.bat" }\n      ],\n      "process_timeout_secs": 10\n    }\n  ]\n}')}</textarea></div>
      <button class="btn btn-primary" data-action="create-wf">Create</button>
      <button class="btn" data-action="cancel-form">Cancel</button>
    </div>`;
}

async function createWorkflow() {
  const name = document.getElementById('wf-name').value.trim() || 'unnamed';
  const defRaw = document.getElementById('wf-def').value;
  try {
    JSON.parse(defRaw); // validate JSON
  } catch(e) {
    toast('Invalid JSON: ' + e.message, true);
    return;
  }
  try {
    const r = await POST('/api/workflows', { name, definition: defRaw });
    toast('Workflow created: ' + r.id.slice(0,8));
    location.hash = '#/workflows';
  } catch(e) {
    toast('Create failed: ' + e.message, true);
  }
}

async function deleteWorkflow(id) {
  if (!confirm('Delete this workflow and all its runs?')) return;
  try {
    await DEL('/api/workflows/' + id);
    toast('Deleted');
    nav();
  } catch(e) {
    toast('Delete failed: ' + e.message, true);
  }
}

async function triggerRun(wfId) {
  try {
    const r = await POST('/api/workflows/' + wfId + '/run');
    toast('Run started: ' + r.run_id.slice(0,8));
    location.hash = '#/runs/' + r.run_id;
  } catch(e) {
    toast('Trigger failed: ' + e.message, true);
  }
}

async function stopRun(runId) {
  var btn = document.getElementById('stop-run-btn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Stopping...'; }
  try {
    await POST('/api/runs/' + runId + '/stop');
    toast('Stop requested — pending nodes will be skipped');
    if (btn) btn.remove();
    // Update badge immediately so user sees feedback
    var badge = document.getElementById('run-status-badge');
    if (badge) { badge.textContent = 'stopping'; badge.className = 'badge badge-Failed'; }
  } catch(e) {
    toast('Stop failed: ' + e.message, true);
    if (btn) { btn.disabled = false; btn.textContent = '⏹ Stop'; }
  }
}

// ── Workflow Detail ─────────────────────────────────────────────
async function renderWorkflowDetail(id) {
  let wf, graph = { nodes:[], edges:[], dataflows:[] };
  try { wf = await GET('/api/workflows/' + id); } catch(e) { showError('Workflow not found'); return; }
  if (!wf || wf.error) { showError(wf?.error || 'Not found'); return; }
  currentWfDef = wf;
  try { graph = await GET('/api/workflows/' + id + '/graph'); } catch(e) {}
  currentGraph = graph;
  document.getElementById('content').innerHTML = `
    <div class="meta">
      <span>ID: <code>${id.slice(0,8)}</code></span>
      <span>Name: <b>${esc(wf.name)}</b></span>
      <span>Updated: ${wf.updated_at||'-'}</span>
    </div>
    <div style="margin-bottom:16px">
      <button class="btn btn-primary" data-action="trigger-run" data-id="${id}">▶ Run</button>
      <button class="btn" data-action="goto" data-hash="#/workflows">← Back</button>
    </div>
    <div class="card"><h2>DAG Topology</h2><div class="dag-node-hint">🖱 Click a node to see details</div><div id="dag-view" class="dag-container"></div></div>`;
  if (graph.nodes && graph.nodes.length) initDAG('dag-view', graph);
}

// ── Runs ────────────────────────────────────────────────────────
async function renderRuns() {
  let list = [];
  try { list = await GET('/api/runs'); } catch(e) { toast('Failed to load runs', true); }
  if (!Array.isArray(list)) list = [];
  document.getElementById('content').innerHTML = `
    <h2>Run History</h2>
    <div class="card">
      ${list.length ? `<table><tr><th>Run ID</th><th>Workflow</th><th>Status</th><th>Finished</th></tr>
        ${list.map(r => `<tr style="cursor:pointer" data-action="goto" data-hash="#/runs/${r.id}">
          <td style="font-family:monospace">${r.id.slice(0,8)}</td>
          <td>${(r.workflow_id||'').slice(0,8)}</td>
          <td><span class="badge badge-${r.status||'Pending'}">${r.status||'?'}</span></td>
          <td style="color:var(--muted)">${r.finished_at||'-'}</td>
        </tr>`).join('')}</table>` : '<div class="empty">No runs yet. Create a workflow and trigger a run.</div>'}
    </div>`;
}

// ── Run Monitor ─────────────────────────────────────────────────
async function renderRunMonitor(runId) {
  if (wsConnection) { wsConnection.close(); wsConnection = null; }
  activeRunId = runId;
  // Try restoring previous state (survives refresh via sessionStorage)
  if (!loadState(runId)) {
    logs = []; nodeStates = {};
  }

  let run;
  try { run = await GET('/api/runs/' + runId); } catch(e) { showError('Run not found'); return; }
  if (run.error) { showError(run.error); return; }

  let graph = { nodes:[], edges:[], dataflows:[] };
  try { graph = await GET('/api/workflows/' + run.workflow_id + '/graph'); } catch(e) {}
  try { currentWfDef = await GET('/api/workflows/' + run.workflow_id); } catch(e) { currentWfDef = null; }
  currentGraph = graph;

  // Init node status panel from graph data — only for nodes not yet seen.
  (graph.nodes||[]).forEach(function(n) {
    if (!nodeStates[n.id]) nodeStates[n.id] = { status: 'Pending', ts: 0 };
  });

  var isRunning = run.status === 'accepted' || run.status === 'running';
  document.getElementById('content').innerHTML = `
    <div class="meta">
      <span>Run: <code>${runId.slice(0,8)}</code></span>
      <span>Status: <span class="badge badge-${run.status||'Pending'}" id="run-status-badge">${run.status||'?'}</span></span>
      <span>Started: ${run.started_at||'pending...'}</span>
    </div>
    <button class="btn" data-action="goto" data-hash="#/runs">← All Runs</button>
    ${isRunning ? `<button class="btn btn-danger" id="stop-run-btn" data-action="stop-run" data-id="${runId}">⏹ Stop</button>` : ''}
    <div class="card" style="margin-top:16px;margin-bottom:16px"><h2>Live DAG</h2><div class="dag-node-hint">🖱 Click a node to see details</div><div id="dag-live" class="dag-container"></div></div>
    <div class="row">
      <div class="col"><div class="card"><h2>Node Status</h2><div id="status-panel" style="font-size:13px;max-height:300px;overflow-y:auto"><span style="color:var(--muted)">Waiting...</span></div></div></div>
      <div class="col"><div class="card"><h2>Raw Log</h2><div id="log-panel" class="log-panel"><span style="color:var(--muted)">Waiting for events...</span></div></div></div>
    </div>`;

  renderStatusPanel();
  renderLogs(); // Restore logs from sessionStorage if any
  if (graph.nodes && graph.nodes.length) initDAG('dag-live', graph);
  connectWS(runId);
}

function showError(msg) {
  document.getElementById('content').innerHTML = `<div class="empty">${esc(msg)}</div>`;
}

// ── DAG (vis-network) ───────────────────────────────────────────
function initDAG(containerId, graphData) {
  dagReady = false; pendingStatuses = [];
  try {
    var vis = window.vis;
    var container = document.getElementById(containerId);
    if (!container || typeof vis === 'undefined') {
      if (container) container.innerHTML = '<div class="empty">vis-network not loaded</div>';
      dagReady = true; return;
    }

    var nodes = graphData.nodes || [];
    var edges = graphData.edges || [];

    // Assign positions: spread nodes on a grid to separate edges visually.
    // Levels are determined by BFS from entry nodes (no incoming edges).
    var inDegree = {}, outEdges = {};
    nodes.forEach(function(n) { inDegree[n.id] = 0; outEdges[n.id] = []; });
    edges.forEach(function(e) { inDegree[e.to] = (inDegree[e.to]||0) + 1; outEdges[e.from].push(e); });

    // Detect cycle edges: if A→B and B→A both exist, put them at same level
    var cyclePairs = {};
    edges.forEach(function(e) {
      var rev = edges.some(function(r) { return r.from === e.to && r.to === e.from; });
      if (rev) { cyclePairs[e.from] = e.to; cyclePairs[e.to] = e.from; }
    });

    var level = {}, maxLevel = 0;
    function assignLevel(id, lvl) {
      if (level[id] !== undefined) return;
      level[id] = lvl;
      if (lvl > maxLevel) maxLevel = lvl;
      (outEdges[id]||[]).forEach(function(e) {
        // Cycle partner stays at same level
        var nl = cyclePairs[e.to] ? lvl : lvl + 1;
        assignLevel(e.to, nl);
      });
    }
    nodes.forEach(function(n) { if (!inDegree[n.id]) assignLevel(n.id, 0); });
    nodes.forEach(function(n) { if (level[n.id]===undefined) assignLevel(n.id, maxLevel+1); });

    // Count nodes per level to stack them vertically
    var countPerLevel = {};
    nodes.forEach(function(n) { var l=level[n.id]; countPerLevel[l]=(countPerLevel[l]||0)+1; });

    var idxPerLevel = {};
    var xGap = 280, yGap = 180;
    dagNodes = new vis.DataSet(nodes.map(function(n) {
      var l = level[n.id];
      var idx = idxPerLevel[l] || 0;
      idxPerLevel[l] = idx + 1;
      // Center nodes vertically within their level
      var total = countPerLevel[l] || 1;
      var yOff = (idx - (total-1)/2) * yGap;
      return {
        id: n.id, label: n.label||n.id,
        x: l * xGap, y: yOff,
        fixed: { x: true, y: true },
        color: { background: STATUS_COLORS.Pending, border: '#334155' },
        borderWidth: 2, font: { color: '#e2e8f0', size: 14 },
        shape: 'box', margin: 14, widthConstraint: { minimum: 80, maximum: 140 },
      };
    }));

    // Assign distinct curve styles to avoid overlapping edges.
    // Count edges per (from,to) pair to stagger curves.
    var edgeKey = {};
    var styles = ['curvedCW', 'curvedCCW', 'cubicBezier'];
    dagEdges = new vis.DataSet(edges.map(function(e, i) {
      var key = e.from + '->' + e.to;
      var idx = edgeKey[key] || 0;
      edgeKey[key] = idx + 1;
      // Cycle returns (fix->review) use opposite curve direction
      var isCycle = (e.from === 'fix' && e.to === 'review');
      var st = isCycle ? 'curvedCCW' : styles[idx % styles.length];
      var r = isCycle ? 0.3 : (0.15 + idx * 0.1);
      return {
        id: 'e'+i, from: e.from, to: e.to, label: e.label||'',
        arrows: { to: { enabled: true } },
        color: { color: isCycle ? '#f59e0b' : '#64748b' },
        width: isCycle ? 2 : 1.5,
        font: { color: '#94a3b8', size: 10, strokeWidth: 0 },
        smooth: { type: st, roundness: r },
      };
    }));

    dagNetwork = new vis.Network(container, { nodes: dagNodes, edges: dagEdges }, {
      layout: { randomSeed: 1 },
      physics: { enabled: false },
      interaction: { hover: true, dragNodes: false },
    });

    // Click handler: show node detail panel
    dagNetwork.on('click', function(params) {
      if (params.nodes.length > 0) {
        showNodeDetail(params.nodes[0]);
      }
    });

    dagReady = true;
    // Replay buffered WS statuses
    for (var i = 0; i < pendingStatuses.length; i++) {
      var s = pendingStatuses[i];
      dagNodes.update({ id: s.nodeId, color: { background: STATUS_COLORS[s.status] || '#64748b', border: '#334155' } });
    }
    pendingStatuses = [];
    // Restore DAG colors from sessionStorage (survives refresh)
    for (var nid in nodeStates) {
      if (nodeStates.hasOwnProperty(nid)) {
        dagNodes.update({ id: nid, color: { background: STATUS_COLORS[nodeStates[nid].status] || '#64748b', border: '#334155' } });
      }
    }
  } catch(e) {
    var c = document.getElementById(containerId);
    if (c) c.innerHTML = '<div class="empty">DAG error: ' + (e.message||'') + '</div>';
    dagReady = true;
  }
}

function updateNodeStatus(nodeId, status) {
  nodeStates[nodeId] = { status, ts: Date.now() };
  saveState();
  renderStatusPanel();
  if (dagReady && dagNodes) {
    dagNodes.update({ id: nodeId, color: { background: STATUS_COLORS[status] || '#64748b', border: '#334155' } });
  } else {
    pendingStatuses.push({ nodeId, status });
  }
}

function renderStatusPanel() {
  const panel = document.getElementById('status-panel');
  if (!panel) return;
  const ids = Object.keys(nodeStates);
  if (!ids.length) { panel.innerHTML = '<span style="color:var(--muted)">Waiting...</span>'; return; }
  // Sort: Running first, then most recent
  ids.sort((a,b) => {
    const sa = nodeStates[a].status, sb = nodeStates[b].status;
    if (sa === 'Running' && sb !== 'Running') return -1;
    if (sb === 'Running' && sa !== 'Running') return 1;
    return (nodeStates[b].ts||0) - (nodeStates[a].ts||0);
  });
  panel.innerHTML = ids.map(id => {
    const s = nodeStates[id];
    const color = STATUS_COLORS[s.status] || '#64748b';
    return `<div style="display:flex;align-items:center;padding:3px 0;border-bottom:1px solid var(--border)">
      <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${color};margin-right:8px;flex-shrink:0"></span>
      <span style="flex:1;font-family:monospace;font-size:12px">${esc(id)}</span>
      <span class="badge badge-${s.status}" style="font-size:10px">${s.status}</span>
    </div>`;
  }).join('');
}

// ── WebSocket ───────────────────────────────────────────────────
function connectWS(runId) {
  try {
    wsConnection = new WebSocket(WS_BASE + '/ws/runs/' + runId);
  } catch(e) {
    appendLog('ws', 'Failed to connect: ' + e.message, Date.now());
    return;
  }
  wsConnection.onopen = () => {
    appendLog('ws', 'Connected to run ' + runId.slice(0,8), Math.floor(Date.now()/1000));
    // Sync DAG: push all known node states to the vis-network on connect.
    // Covers timing gaps where statuses arrived before the DAG was ready
    // or before the WS connection was established.
    if (dagReady && dagNodes) {
      for (var nid in nodeStates) {
        if (nodeStates.hasOwnProperty(nid)) {
          var bg = STATUS_COLORS[nodeStates[nid].status] || '#64748b';
          dagNodes.update({ id: nid, color: { background: bg, border: '#334155' } });
        }
      }
    }
  };
  wsConnection.onmessage = e => {
    try {
      const msg = JSON.parse(e.data);
      switch (msg.type) {
        case 'node_status':
          updateNodeStatus(msg.data.node_id, msg.data.status);
          appendLog(msg.data.node_id, '[status: ' + msg.data.status + ']', msg.data.ts);
          break;
        case 'node_chunk':
          appendLog(msg.data.node_id, msg.data.text, msg.data.ts);
          break;
        case 'snapshot':
          if (msg.data.nodes) Object.entries(msg.data.nodes).forEach(([id, s]) => updateNodeStatus(id, s));
          break;
        case 'workflow_done':
          appendLog('engine', 'Workflow ' + msg.data.status + ' (' + msg.data.duration_secs + 's)', msg.data.ts || Math.floor(Date.now()/1000));
          const badge = document.getElementById('run-status-badge');
          if (badge) { badge.textContent = msg.data.status; badge.className = 'badge badge-' + msg.data.status; }
          break;
        case 'error':
          appendLog('error', msg.data.message, msg.data.ts || Math.floor(Date.now()/1000));
          break;
      }
    } catch(_) {}
  };
  wsConnection.onclose = () => appendLog('ws', 'Disconnected', Math.floor(Date.now()/1000));
  wsConnection.onerror = () => appendLog('ws', 'Connection error', Math.floor(Date.now()/1000));
}

// ── Log Stream ──────────────────────────────────────────────────
function appendLog(nodeId, text, ts) {
  if (!text || !text.trim()) return; // skip heartbeat whitespace
  logs.push({ nodeId, text, ts });
  if (logs.length > 500) logs.shift();
  saveState();
  const panel = document.getElementById('log-panel');
  if (!panel) return;
  const t = ts ? new Date(ts * 1000).toLocaleTimeString() : '';
  panel.innerHTML = logs.map(l =>
    '<div class="log-line"><span class="log-ts">' + t + '</span><span class="log-node">[' + esc(l.nodeId) + ']</span><span class="log-text">' + esc(l.text) + '</span></div>'
  ).join('');
  panel.scrollTop = panel.scrollHeight;
}

function renderLogs() {
  const panel = document.getElementById('log-panel');
  if (!panel || !logs.length) return;
  panel.innerHTML = logs.map(function(l) {
    var t = l.ts ? new Date(l.ts * 1000).toLocaleTimeString() : '';
    return '<div class="log-line"><span class="log-ts">' + t + '</span><span class="log-node">[' + esc(l.nodeId) + ']</span><span class="log-text">' + esc(l.text) + '</span></div>';
  }).join('');
  panel.scrollTop = panel.scrollHeight;
}

// ── Util ────────────────────────────────────────────────────────
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

// ── Node Detail Panel ────────────────────────────────────────────
function showNodeDetail(nodeId) {
  var panel = document.getElementById('node-panel');
  var overlay = document.getElementById('overlay');
  var content = document.getElementById('node-panel-content');
  if (!panel || !content) return;

  // Find node info from currentGraph + currentWfDef
  var nodeDef = null;
  if (currentWfDef) {
    var def = currentWfDef.definition || currentWfDef;
    // definition might be a string (JSON) or object
    try {
      if (typeof def === 'string') def = JSON.parse(def);
    } catch(e) {}
    var nodes = def.nodes || [];
    nodeDef = nodes.find(function(n) { return n.id === nodeId; });
  }

  // Edges from/to this node
  var graphEdges = (currentGraph && currentGraph.edges) ? currentGraph.edges : [];
  var dataflows = (currentGraph && currentGraph.dataflows) ? currentGraph.dataflows : [];
  var inEdges = graphEdges.filter(function(e) { return e.to === nodeId; });
  var outEdges = graphEdges.filter(function(e) { return e.from === nodeId; });
  var dfIn = dataflows.filter(function(d) { return d.to === nodeId; });
  var dfOut = dataflows.filter(function(d) { return d.from === nodeId; });

  if (!nodeDef) {
    content.innerHTML = '<h3>' + esc(nodeId) + '</h3><div class="no-data">No definition data available for this node. Run info only.</div>';
  } else {
    var provider = (nodeDef.providers && nodeDef.providers.length) ? nodeDef.providers[0] : {};
    var ptype = provider.type || '?';

    var html = '<h3>' + esc(nodeId) + '</h3>';

    // Basic info
    html += '<h4>Basic</h4>';
    html += '<div class="kv"><span class="kv-k">Provider</span><span class="kv-v">' + esc(ptype) + '</span></div>';
    html += '<div class="kv"><span class="kv-k">Timeout</span><span class="kv-v">' + esc(String(nodeDef.process_timeout_secs || '?')) + 's</span></div>';
    if (nodeDef.max_retries != null) html += '<div class="kv"><span class="kv-k">Max Retries</span><span class="kv-v">' + esc(String(nodeDef.max_retries)) + '</span></div>';
    if (nodeDef.returns && nodeDef.returns.length) {
      html += '<div class="kv"><span class="kv-k">Returns</span><span class="kv-v">';
      nodeDef.returns.forEach(function(r) { html += '<span class="tag">' + esc(r) + '</span> '; });
      html += '</span></div>';
    }

    // Route policy
    if (nodeDef.route_policy) {
      var rp = nodeDef.route_policy;
      html += '<h4>Route Policy</h4>';
      html += '<div class="kv"><span class="kv-k">Type</span><span class="kv-v">' + esc(rp.type || '?') + '</span></div>';
      html += '<div class="kv"><span class="kv-k">Max Runs</span><span class="kv-v">' + esc(String(rp.max != null ? rp.max : '?')) + '</span></div>';
      html += '<div class="kv"><span class="kv-k">Then Route</span><span class="kv-v">' + esc(rp.then_route || '?') + '</span></div>';
    }

    // Provider-specific
    html += '<h4>Provider Config</h4>';
    if (ptype === 'llm_sdk' || ptype === 'llm') {
      html += '<div class="kv"><span class="kv-k">Model</span><span class="kv-v">' + esc(provider.model || '(CLI)') + '</span></div>';
      if (provider.max_tokens) html += '<div class="kv"><span class="kv-k">Max Tokens</span><span class="kv-v">' + esc(String(provider.max_tokens)) + '</span></div>';
      if (provider.routes && provider.routes.length) {
        html += '<div class="kv"><span class="kv-k">Routes</span><span class="kv-v">';
        provider.routes.forEach(function(r) { html += '<span class="tag g-tag">' + esc(r) + '</span> '; });
        html += '</span></div>';
      }
      if (provider.system_prompt) {
        html += '<h4>System Prompt</h4><div class="prompt-block">' + esc(provider.system_prompt) + '</div>';
      }
      if (provider.command) {
        html += '<h4>Command</h4><div class="prompt-block">' + esc(provider.command) + '</div>';
      }
      if (provider.prompt) {
        html += '<h4>Prompt</h4><div class="prompt-block">' + esc(provider.prompt) + '</div>';
      }
    } else if (ptype === 'shell' || ptype === 'subprocess') {
      if (provider.command) {
        html += '<h4>Command</h4><div class="prompt-block">' + esc(provider.command) + '</div>';
      }
    }

    // Status (from run monitor)
    if (nodeStates[nodeId]) {
      html += '<h4>Run Status</h4>';
      var st = nodeStates[nodeId];
      var color = STATUS_COLORS[st.status] || '#64748b';
      html += '<div class="kv"><span class="kv-k">Status</span><span class="kv-v"><span class="badge badge-' + st.status + '">' + esc(st.status) + '</span></span></div>';
    }
  }

  // Topology (always show)
  html += '<h4>Topology</h4>';
  // Incoming edges
  html += '<div style="margin-bottom:4px"><span style="color:var(--muted);font-size:11px">Incoming edges (' + inEdges.length + '):</span><br>';
  if (inEdges.length) {
    inEdges.forEach(function(e) {
      var parts = [esc(e.from), 'trigger:' + esc(e.trigger||'?'), 'event:' + esc(e.event||'?')];
      if (e.exit_reason) parts.push('exit_reason:' + esc(e.exit_reason));
      html += '<span class="tag r-tag">' + parts.join(' | ') + '</span><br>';
    });
  } else { html += '<span class="no-data">none</span><br>'; }
  html += '</div>';
  // Outgoing edges
  html += '<div style="margin-bottom:4px"><span style="color:var(--muted);font-size:11px">Outgoing edges (' + outEdges.length + '):</span><br>';
  if (outEdges.length) {
    outEdges.forEach(function(e) {
      var parts = [esc(e.to), 'trigger:' + esc(e.trigger||'?'), 'event:' + esc(e.event||'?')];
      if (e.exit_reason) parts.push('exit_reason:' + esc(e.exit_reason));
      html += '<span class="tag r-tag">' + parts.join(' | ') + '</span><br>';
    });
  } else { html += '<span class="no-data">none</span><br>'; }
  html += '</div>';
  // Dataflows
  html += '<div><span style="color:var(--muted);font-size:11px">Dataflows — receives from (' + dfIn.length + '):</span><br>';
  if (dfIn.length) {
    dfIn.forEach(function(d) {
      var alias = d.alias ? ' (as ' + esc(d.alias) + ')' : '';
      html += '<span class="tag g-tag">← ' + esc(d.from) + alias + '</span><br>';
    });
  } else { html += '<span class="no-data">none</span><br>'; }
  html += '<span style="color:var(--muted);font-size:11px">Dataflows — sends to (' + dfOut.length + '):</span><br>';
  if (dfOut.length) {
    dfOut.forEach(function(d) {
      var alias = d.alias ? ' (as ' + esc(d.alias) + ')' : '';
      html += '<span class="tag g-tag">→ ' + esc(d.to) + alias + '</span><br>';
    });
  } else { html += '<span class="no-data">none</span><br>'; }
  html += '</div>';

  content.innerHTML = html;
  panel.classList.add('open');
  overlay.classList.add('show');
}

function closeNodePanel() {
  var panel = document.getElementById('node-panel');
  var overlay = document.getElementById('overlay');
  if (panel) panel.classList.remove('open');
  if (overlay) overlay.classList.remove('show');
}
document.getElementById('overlay').addEventListener('click', closeNodePanel);
</script>
